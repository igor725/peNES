name: build peNES

on:
  push:

jobs:
  build:
    name: peNES
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            compiler_cxx: clang
            extension: .exe
          - name: Linux
            os: ubuntu-latest
            compiler_cxx: clang++
            extension:

    runs-on: ${{ matrix.config.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Pull dependencies
        if: ${{ matrix.config.os == 'ubuntu-latest' }}
        run: |
          sudo apt update
          sudo apt install build-essential git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev \
          libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: Install Latest LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"
          env: true

      - name: Build emulator
        run: |
          cmake -GNinja -S. -Bbuild/ -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=${{ matrix.config.compiler_cxx }}
          cmake --build build/ -j4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: peNES ${{ matrix.config.name }}
          path: ./build/peNES${{ matrix.config.extension }}
